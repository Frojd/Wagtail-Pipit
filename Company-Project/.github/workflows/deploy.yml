name: Deploy
run-name: "${{ format('Deploy to {0} ({1})', inputs.environment || 'auto', inputs.ref || github.ref_name) }}"

on:
  workflow_call: {}
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git ref to deploy (tag, branch, or SHA). Leave empty for current branch.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6.1.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Next.js build
        uses: actions/cache@v4.2.3
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.scss') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Configure Sentry environment
        working-directory: frontend
        run: |
          BRANCH="${{ inputs.ref || github.ref_name }}"
          echo "NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN" >> .env

          if [ "$BRANCH" == "develop" ]; then
            echo "SENTRY_ENVIRONMENT=stage" >> .env
            echo "SENTRY_RELEASE=develop-${BRANCH}" >> .env
          fi

          if [[ "$BRANCH" == v* ]]; then
            echo "SENTRY_ENVIRONMENT=prod" >> .env
            echo "SENTRY_RELEASE=${BRANCH}" >> .env
          fi

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build Storybook
        run: npm run build-storybook
        working-directory: frontend

      - name: Prune dev dependencies
        run: npm prune --omit=dev
        working-directory: frontend

      - name: Remove non-deployment files
        run: |
          rm -rf .next/cache
          rm -rf stories .storybook __mocks__ cli
          rm -f jest.config.js setupTests.js .prettierrc.js .prettierignore .swcrc
        working-directory: frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v6.0.0
        with:
          name: frontend-build
          path: frontend/
          include-hidden-files: true

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Upload src build
        uses: actions/upload-artifact@v6.0.0
        with:
          name: src-build
          path: src/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: >-
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    environment:
      name: staging
      url: https://stage.example.com
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: astral-sh/setup-uv@v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "deploy/requirements.txt"
          python-version: '3.12'

      - name: Download backend build
        uses: actions/download-artifact@v6.0.0
        with:
          name: src-build
          path: src/

      - name: Download frontend build
        uses: actions/download-artifact@v6.0.0
        with:
          name: frontend-build
          path: frontend/

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Install Ansible and Ansistrano
        run: |
          uv venv
          uv pip install -r deploy/requirements.txt
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          cd deploy
          ansible-galaxy install -r requirements.yml

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Move frontend into src
        run: mv frontend src

      - name: Deploy to staging
        run: |
          cd deploy
          ansible-playbook deploy.yml -i stages/stage.yml

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to be ready..."
          for i in {1..30}; do
            if curl -sf -o /dev/null --max-time 10 https://stage.example.com/wt/health-check/; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

  dast:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: .zap

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: https://stage.example.com
          cmd_options: '-j -m 1 -d 1'
          fail_action: true
          allow_issue_writing: false
          rules_file_name: '.zap/rules.tsv'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: zap-report
          path: report_html.html

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, dast]
    if: >-
      !cancelled() &&
      needs.build-frontend.result == 'success' &&
      needs.build-backend.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://example.com
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: astral-sh/setup-uv@v7.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "deploy/requirements.txt"
          python-version: '3.12'

      - name: Download backend build
        uses: actions/download-artifact@v6.0.0
        with:
          name: src-build
          path: src/

      - name: Download frontend build
        uses: actions/download-artifact@v6.0.0
        with:
          name: frontend-build
          path: frontend/

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Install Ansible and Ansistrano
        run: |
          uv venv
          uv pip install -r deploy/requirements.txt
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          cd deploy
          ansible-galaxy install -r requirements.yml

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Move frontend into src
        run: mv frontend src

      - name: Deploy to production
        run: |
          cd deploy
          ansible-playbook deploy.yml -i stages/prod.yml

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to be ready..."
          for i in {1..30}; do
            if curl -sf -o /dev/null --max-time 10 https://example.com/wt/health-check/; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

